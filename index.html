<!DOCTYPE html>
<html lang="zh-TW">

<head>

    <title>記者發布會專案管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0f172a',
                        secondary: '#334155',
                        accent: '#3b82f6',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>

                <span class="text-gray-700 font-medium text-sm md:text-base whitespace-nowrap">👤 我是哪一組：</span>
                <select id="group-filter" onchange="filterByGroup(this.value)"
                    class="flex-1 sm:flex-none px-3 md:px-4 py-2 border border-gray-300 rounded-lg bg-white text-gray-800 font-medium focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent cursor-pointer min-w-0 sm:min-w-[180px] text-sm md:text-base">

                    <!-- 選項會由 JavaScript 動態生成 -->
                </select>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="clearFilter()"
                    class="px-3 md:px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg font-medium transition-colors flex items-center gap-1 text-sm md:text-base">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                    清除
                </button>
                <!-- 顯示目前篩選狀態 -->
                <div id="filter-status"
                    class="hidden text-xs md:text-sm text-accent font-medium bg-blue-50 px-2 md:px-3 py-1 rounded-full">
                    <!-- 動態顯示篩選中的組別 -->
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="flex border-b border-gray-200 mb-4 md:mb-8 overflow-x-auto -mx-4 px-4 md:mx-0 md:px-0">
            <button onclick="switchTab('groups')" id="tab-groups"
                class="px-4 md:px-6 py-2 md:py-3 text-base md:text-lg font-medium text-accent border-b-2 border-accent hover:bg-gray-50 transition-colors focus:outline-none whitespace-nowrap">
                👥 各組分配
            </button>
            <button onclick="switchTab('rundown')" id="tab-rundown"
                class="px-4 md:px-6 py-2 md:py-3 text-base md:text-lg font-medium text-gray-500 border-b-2 border-transparent hover:text-gray-700 hover:border-gray-300 transition-colors focus:outline-none whitespace-nowrap">
                ⏱️ 流程表
            </button>
        </div>

        <!-- Groups Content -->
        <div id="content-groups" class="tab-content active animate-fade-in">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="groups-container">
                <!-- Groups will be injected here -->
            </div>
        </div>

        <!-- Rundown Content -->
        <div id="content-rundown" class="tab-content animate-fade-in">
            <div class="overflow-x-auto bg-white rounded-lg shadow">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-100">
                        <tr>
                            <th
                                class="px-2 md:px-6 py-2 md:py-3 text-left text-xs font-bold text-gray-600 uppercase tracking-wider">
                                時間</th>
                            <th
                                class="px-2 md:px-6 py-2 md:py-3 text-left text-xs font-bold text-gray-600 uppercase tracking-wider">
                                項目</th>
                            <th
                                class="px-2 md:px-6 py-2 md:py-3 text-left text-xs font-bold text-gray-600 uppercase tracking-wider hidden md:table-cell">
                                執行重點</th>
                            <th
                                class="px-2 md:px-6 py-2 md:py-3 text-left text-xs font-bold text-gray-600 uppercase tracking-wider">
                                負責</th>
                            <th
                                class="px-2 md:px-6 py-2 md:py-3 text-left text-xs font-bold text-gray-600 uppercase tracking-wider hidden lg:table-cell">

                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200" id="rundown-container">
                        <!-- Rundown rows will be injected here -->
                    </tbody>
                </table>
            </div>

    </main>

        <div class="container mx-auto px-4 text-center text-sm">

        </div>
    </footer>

            id="modal-content">

        </div>
    </div>

            // 如果 currentFilterGroup 為空，顯示全部；否則只顯示選中的組別
            const groupsToShow = currentFilterGroup === ''
                ? groupsData
                : groupsData.filter(g => g.id === parseInt(currentFilterGroup));

            // 如果篩選後沒有結果，顯示提示訊息
            if (groupsToShow.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center text-gray-500 py-8">找不到符合條件的組別</div>';
                return;
            }

            container.innerHTML = groupsToShow.map(group => {
                // Generate notes HTML based on new structure
                // 產生「會前/會中/會後」的任務清單 HTML
                let notesHtml = '';

                    if (group.notes.before && group.notes.before.length > 0) {

                        notesHtml += `<div><strong class="text-xs uppercase tracking-wider text-gray-500 block mb-1">會後</strong><ul class="list-disc list-outside ml-4 text-xs md:text-sm text-gray-600 space-y-1">${group.notes.after.map(n => `<li class="break-words">${n}</li>`).join('')}</ul></div>`;

            const group = groupsData.find(g => g.id === id);

            const modal = document.getElementById('group-modal');

            // Helper for formatting content with colors

                if (!text) return '';
                return text
                    .replace(/淺綠名牌/g, '<span class="text-green-600 font-bold">淺綠名牌</span>')
                    .replace(/深綠色名牌/g, '<span class="text-green-800 font-bold">深綠色名牌</span>')

                    .replace(/粉紅名牌/g, '<span class="text-pink-600 font-bold">粉紅名牌</span>')
                    .replace(/(注意|禁止|嚴禁|警告|必看|重點|異常處理)/g, '<span class="text-red-600 font-bold">$1</span>');

            // Determine table headers

        // 渲染活動流程表（支援篩選醒目標示）
        function renderRundown() {
            const container = document.getElementById('rundown-container');

            // 取得目前選中的組別資訊（用於比對）
            const selectedGroup = currentFilterGroup !== ''
                ? groupsData.find(g => g.id === parseInt(currentFilterGroup))
                : null;

            container.innerHTML = rundownData.map((row, index) => {
                // 判斷這一列是否與選中的組別相關
                // 檢查負責組別欄位是否包含選中組別的編號或名稱
                let isRelevant = false;
                if (selectedGroup) {
                    // 檢查是否包含組別編號（例如「0.」「1.」）或組別名稱
                    isRelevant = row.groups.includes(`${selectedGroup.id}.`) ||
                        row.groups.includes(selectedGroup.name);
                }

                // 根據是否相關，設定不同的樣式
                // 相關：黃色背景 + 左側藍色邊框
                // 不相關但有篩選：淡化顯示
                // 無篩選：正常顯示
                let rowClass = '';
                if (currentFilterGroup === '') {
                    // 無篩選時，交替顯示白色和灰色背景
                    rowClass = index % 2 === 0 ? 'bg-white' : 'bg-gray-50';
                } else if (isRelevant) {
                    // 相關的時段：醒目黃色背景 + 左側藍色邊框
                    rowClass = 'bg-yellow-50 border-l-4 border-l-accent';
                } else {
                    // 不相關的時段：淡化顯示
                    rowClass = 'bg-gray-100 opacity-50';
                }

                return `
                <tr class="${rowClass} hover:bg-blue-50 transition-colors">
                    <td class="px-2 md:px-6 py-2 md:py-4 whitespace-nowrap text-xs md:text-sm font-bold ${isRelevant ? 'text-accent' : 'text-gray-500'}">${row.time}</td>
                    <td class="px-2 md:px-6 py-2 md:py-4 text-xs md:text-sm ${isRelevant ? 'font-bold text-gray-900' : 'font-semibold text-gray-700'}">${row.item}</td>
                    <td class="px-2 md:px-6 py-2 md:py-4 text-xs md:text-sm text-gray-700 leading-relaxed hidden md:table-cell">${row.execution}</td>
                    <td class="px-2 md:px-6 py-2 md:py-4 text-xs md:text-sm text-gray-600">
                        <span class="inline-block ${isRelevant ? 'bg-accent text-white' : 'bg-gray-200 text-gray-700'} rounded-full px-2 md:px-3 py-1 text-xs font-semibold">
                            ${row.groups}
                        </span>
                    </td>
                    <td class="px-2 md:px-6 py-2 md:py-4 text-xs md:text-sm text-gray-500 italic hidden lg:table-cell">${row.note}</td>
                </tr>
            `}).join('');
        }

        function switchTab(tabName) {
            // Hide all content
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            // Show selected content
            document.getElementById(`content-${tabName}`).classList.add('active');

            // Update Tab Styles
            const tabs = ['groups', 'rundown'];
            tabs.forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (t === tabName) {
                    btn.classList.add('text-accent', 'border-accent');
                    btn.classList.remove('text-gray-500', 'border-transparent');
                } else {
                    btn.classList.remove('text-accent', 'border-accent');
                    btn.classList.add('text-gray-500', 'border-transparent');
                }
            });
        }

        // ========== 篩選功能相關變數與函式 ==========

        // 目前選擇的組別 ID（空字串表示顯示全部）
        let currentFilterGroup = '';

        /**
         * 初始化組別選擇器的選項
         * 從 groupsData 讀取所有組別，動態產生下拉選單選項
         */
        function initGroupFilter() {
            const select = document.getElementById('group-filter');

            // 為每個組別建立選項
            groupsData.forEach(group => {
                const option = document.createElement('option');
                option.value = group.id;  // 選項的值是組別 ID
                option.textContent = `${group.id}. ${group.name}`;  // 顯示「編號. 名稱」
                select.appendChild(option);
            });
        }

        /**
         * 根據選擇的組別篩選內容
         * @param {string} groupId - 選擇的組別 ID（空字串表示全部顯示）
         */
        function filterByGroup(groupId) {
            currentFilterGroup = groupId;

            // 取得篩選狀態顯示區塊
            const filterStatus = document.getElementById('filter-status');

            if (groupId === '') {
                // 如果選擇「全部顯示」，隱藏狀態提示
                filterStatus.classList.add('hidden');
            } else {
                // 顯示目前篩選的組別名稱
                const group = groupsData.find(g => g.id === parseInt(groupId));
                if (group) {
                    filterStatus.textContent = `📍 篩選中：${group.id}. ${group.name}`;
                    filterStatus.classList.remove('hidden');
                }
            }

            // 重新渲染卡片（會套用篩選）
            renderGroups();
            // 重新渲染流程表（會醒目標示相關時段）
            renderRundown();
        }

        /**
         * 清除篩選，恢復顯示全部內容
         */
        function clearFilter() {
            // 重設下拉選單為「全部顯示」
            document.getElementById('group-filter').value = '';
            // 呼叫篩選函式（傳入空字串）
            filterByGroup('');
        }

        // ========== 原有的渲染函式（已修改為支援篩選）==========

        // Initialize（初始化）
        document.addEventListener('DOMContentLoaded', () => {
            initGroupFilter();  // 初始化組別選擇器
            renderGroups();     // 渲染組別卡片
            renderRundown();    // 渲染活動流程表
        });

    </script>
</body>

</html>
